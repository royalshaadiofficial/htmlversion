  :root {

  .topbar-cta { background: var(--ink); color: var(--white) !important; padding: 10px 22px; border-radius: 100px; }

  .hero { padding: 180px 48px 100px; text-align: center; background: #1A1A18; color: #FFF; }

  .grid { max-width: 1240px; margin: 0 auto; padding: 80px 48px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  .fashion-card { position: relative; border-radius: 8px; overflow: hidden; height: 500px; }
  .fashion-img { width: 100%; height: 100%; background: #222; display: flex; align-items: center; justify-content: center; font-size: 5rem; }
  .fashion-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 40px; color: #FFF; }
  .fashion-cat { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 10px; color: var(--accent); font-weight: 700; }
  .fashion-title { font-family: var(--font-display); font-size: 2rem; }

  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; padding: 40px 20px; } }
